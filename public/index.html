<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אפשרות ג'</title>
    <link rel="icon" href="resources/assets/images/icon.png" type="image/png">
    <link rel="stylesheet" href="resources/styles/theme.css">
    <link rel="stylesheet" href="resources/styles/styles.css">
</head>

<body>

    <button id="floatingToggle" class="floating-toggle-btn" onclick="toggleSidebar()" title="הצג תפריט צד">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>

    <aside class="sidebar">
        <div class="sidebar-header-row">
            <h2>ניהול ותזמון</h2>
            <button class="sidebar-close-btn" onclick="toggleSidebar()" title="הסתר תפריט צד">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="13 17 18 12 13 7"></polyline>
                    <polyline points="6 17 11 12 6 7"></polyline>
                </svg>
            </button>
        </div>

        <div
            style="background-color: var(--cell-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color);">
            <div class="control-group">
                <label>סמסטר פעיל</label>
                <select id="profileSelect" onchange="switchProfile(this.value)" style="cursor: pointer;"></select>
            </div>
        </div>

        <details class="collapsible-section">
            <summary>הגדרות מנוע האופטימיזציה</summary>
            <div class="collapsible-content">

                <div class="control-group">
                    <label>אסטרטגיית אופטימיזציה</label>
                    <select id="strategy" onchange="runOptimization()" style="cursor: pointer;">
                        <option value="spacing">תעדוף ריווח בין בחינות</option>
                        <option value="max_c">תעדוף מקסימום מועדי ג'</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>שיקולי מועד ג'</label>
                    <label class="checkbox-label"><input type="checkbox" id="prioritizeCloseC" checked
                            onchange="runOptimization()" style="cursor: pointer;">
                        תעדוף מועדי ג' קרובים</label>
                    <label class="checkbox-label"><input type="checkbox" id="allowDoubleSkip"
                            onchange="runOptimization()" style="cursor: pointer;"> אפשר היעדרות
                        כפולה (דילוג מוצדק לשני המועדים)</label>
                </div>

                <div class="control-group">
                    <label>חוקי היעדרות</label>
                    <label class="checkbox-label"><input type="checkbox" id="rule1" checked onchange="runOptimization()"
                            style="cursor: pointer;"> התנגשות של בחינות באותו יום</label>
                    <label class="checkbox-label"><input type="checkbox" id="rule2" checked onchange="runOptimization()"
                            style="cursor: pointer;"> 3 בחינות ברצף (ללא שבתות)</label>
                    <label class="checkbox-label"><input type="checkbox" id="rule3" checked onchange="runOptimization()"
                            style="cursor: pointer;"> 4 בחינות בשבוע</label>
                </div>

                <div class="control-group">
                    <label>מקסימום מועדי ג': <span id="maxVal" class="val-display">10</span></label>
                    <input style="cursor: pointer;" type="range" id="maxC" min="0" max="10" value="10"
                        oninput="document.getElementById('maxVal').innerText = this.value; runOptimization();">

                    <label>מינימום מועדי ג': <span id="minVal" class="val-display">0</span></label>
                    <input style="cursor: pointer;" type="range" id="minC" min="0" max="10" value="0"
                        oninput="document.getElementById('minVal').innerText = this.value; runOptimization();">
                </div>
            </div>
        </details>

        <div class="course-management">
            <h3>הקורסים שלי</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button class="btn-primary" onclick="openCourseModal()">+ קורס חדש</button>
                <button class="btn-secondary" onclick="loadDefaults()">טען ברירת מחדל</button>
            </div>

            <div id="courseList" class="course-list">
            </div>
        </div>

        <button class="btn-export" onclick="exportICS()">ייצוא ליומן</button>

        <div class="control-group" style="margin-top: 15px;">
            <label class="small-label">מצב תצוגה</label>
            <select id="themeToggle" onchange="setTheme(this.value)" style="cursor: pointer; padding: 6px;">
                <option value="auto">אוטומטי (לפי המערכת)</option>
                <option value="light">בהיר ☀️</option>
                <option value="dark">כהה 🌙</option>
            </select>
        </div>
    </aside>

    <main class="main-content">
        <div class="header">
            <h1 style="margin-top: 0; margin-bottom: 5px;">ניתוח עומס בחינות דינמי</h1>
            <p style="margin: 0; color: var(--text-muted); text-align: center;">המידע שלך נשמר אוטומטית בדפדפן וזמין רק
                לך. הוסף קורסים כדי
                לחשב את
                הסידור האופטימלי.</p>
        </div>

        <div class="results-container">
            <table>
                <thead>
                    <tr>
                        <th>קורס</th>
                        <th style="width: 30%">מועד א'</th>
                        <th style="width: 30%">מועד ב'</th>
                        <th style="text-align: center;">מועד ג'</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    <tr>
                        <td colspan="4" style="text-align:center;">הוסף קורסים כדי לראות תוצאות</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div id="calendarContainer" class="calendar-wrapper">
        </div>
    </main>

    <!-- Add/Edit Course popup modal -->
    <dialog id="courseModal" class="modal">
        <div class="modal-header">
            <h3 id="modalTitle">פרטי קורס</h3>
            <button class="btn-close" onclick="closeCourseModal()">&times;</button>
        </div>
        <form id="courseForm" onsubmit="handleCourseSubmit(event)">
            <input type="hidden" id="editCourseId">
            <div class="control-group">
                <input type="text" id="courseName" placeholder="שם הקורס" required>

                <label class="small-label">תאריך מועד א'</label>
                <input type="date" id="courseDateA" required>
                <label class="checkbox-label small-label"><input type="checkbox" id="forceA"> חובה לגשת למועד א'</label>

                <label class="small-label" style="margin-top: 8px;">תאריך מועד ב'</label>
                <input type="date" id="courseDateB" required>
                <label class="checkbox-label small-label"><input type="checkbox" id="forceB"> חובה לגשת למועד ב'</label>

                <div style="margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--border-color);">
                    <label class="checkbox-label small-label" style="color: var(--success); font-weight: bold;">
                        <input type="checkbox" id="skipB" onchange="handleSkipBToggle(this)">
                        ציון מספק במועד א' (אין צורך במועדי ב' / ג')
                    </label>
                </div>

                <div style="margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--border-color);">
                    <label class="small-label" style="font-weight: bold;">סמסטרים בהם הקורס נלמד:</label>
                    <div style="display: flex; gap: 15px; margin-top: 8px;">
                        <label class="checkbox-label small-label"><input type="checkbox" id="offeredA"> א'</label>
                        <label class="checkbox-label small-label"><input type="checkbox" id="offeredB"> ב'</label>
                        <label class="checkbox-label small-label"><input type="checkbox" id="offeredElul"> אלול</label>
                    </div>
                </div>
            </div>
            <div class="form-actions" style="margin-top: 20px;">
                <button type="submit" id="btnSubmitCourse" class="btn-primary">שמור קורס</button>
            </div>
        </form>
    </dialog>

    <script src="resources/scripts/profiles.js"></script>
    <script src="resources/scripts/defaults.js"></script>
    <script src="resources/scripts/engine.js"></script>
    <script src="resources/scripts/app.js"></script>
</body>

</html>
